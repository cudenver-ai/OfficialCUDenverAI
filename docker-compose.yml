version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"          # HTTP (needed for Certbot challenge)
      - "443:443"        # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./certbot/conf:/etc/letsencrypt
    command: serve -s build --ssl-cert /etc/letsencrypt/live/cudenver-ai.tech/fullchain.pem --ssl-key /etc/letsencrypt/live/cudenver-ai.tech/privkey.pem
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --post-hook \"nginx -s reload\"; sleep 12h & wait $${!}; done'"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
